<!DOCTYPE html>
<html lang="en">
<head>
    <title>Book Appointment - MediWise</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background-color: #f5f7fb;">

<!-- 🔹 NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="{% url 'hospital_list' %}">
            MediWise
        </a>

        <div>
            <a class="btn btn-outline-light" href="{% url 'hospital_list' %}">
                Home
            </a>
        </div>
    </div>
</nav>

<div class="container">

    <div class="card shadow-sm p-4 col-md-6 mx-auto">

        <h3 class="fw-bold mb-4 text-center">📅 Book Appointment</h3>

        <!-- 🔴 CLEAN ERROR DISPLAY -->
        {% if form.errors %}
            <div class="alert alert-danger">
                {% for field in form %}
                    {% for error in field.errors %}
                        <p>{{ error }}</p>
                    {% endfor %}
                {% endfor %}
            </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <!-- Name -->
            <div class="mb-3">
                <label class="form-label">Your Name</label>
                <input type="text" name="patient_name" class="form-control" required>
            </div>

            <!-- Email -->
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" required>
            </div>

            <!-- Hospital -->
            <div class="mb-3">
                <label class="form-label">Select Hospital</label>
                <select name="hospital" class="form-select" required>
                    {% for hospital in hospitals %}
                        <option value="{{ hospital.id }}">{{ hospital.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Date -->
            <div class="mb-3">
                <label class="form-label">Appointment Date</label>
                <input type="date" name="date" class="form-control" required>
            </div>

            <!-- Button -->
            <div class="text-end mt-3">
                <button type="submit" class="btn btn-primary px-4">
                    Book Appointment
                </button>
            </div>

        </form>

    </div>

</div>

</body>
</html>
