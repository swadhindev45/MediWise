<!DOCTYPE html>
<html lang="en">
<head>
    <title>MediWise</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
   <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="{% url 'hospital_list' %}">
            MediWise
        </a>

        <div>
            <a class="btn btn-outline-light" href="{% url 'hospital_list' %}">
                Home
            </a>
        </div>
        <div>
            <a class="btn btn-success" href="{% url 'book_appointment' %}">
                    Book Appointment
            </a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="card p-3 mb-4">

        <h4>Filter Hospitals</h4>

        <form method="get">

            <label>Specialization:</label>
            <select name="spec" class="form-select mb-3">
                <option value="">All</option>
                {% for s in specializations %}
                    <option value="{{ s.name }}">{{ s.name }}</option>
                {% endfor %}
            </select>

            <label>Minimum Rating:</label>
            <input type="number" step="0.1" name="rating" class="form-control mb-3">

            <label>Maximum Cost:</label>
            <input type="number" name="cost" class="form-control mb-3">

            <button type="submit" class="btn btn-primary">Apply Filters</button>

        </form>

    </div>
    <hr class="my-4">
    <h3 class="mb-2">Hospital List</h3>
    <p class="text-muted">Select up to 3 hospitals to compare</p>
    <form method="get" action="{% url 'compare_hospitals' %}">

        <div class="row">

            {% for hospital in hospitals %}
                <div class="col-md-4">

                    <div class="card mb-4 shadow-sm">

                        <div class="card-body">
                            <input type="checkbox" name="compare" value="{{ hospital.id }}">
                            <label>Select</label>
                            <h5 class="mt-2">
                                <a href="{% url 'hospital_detail' hospital.id %}" class="text-decoration-none">
                                    {{ hospital.name }}
                                </a>
                            </h5>
                            <p class="card-text">
                                <strong>Location:</strong> {{ hospital.location }}<br>
                                <strong>Rating:</strong> ⭐ {{ hospital.rating }}<br>
                                <strong>Cost:</strong> 💰 {{ hospital.cost_index }}
                            </p>

                        </div>

                    </div>

                </div>
            {% endfor %}

        </div>
       <div class="text-center">
                <button type="submit" class="btn btn-success px-4">
        Compare
                </button>
        </div>

    </form>

</div>

</body>
</html>
